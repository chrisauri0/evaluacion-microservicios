server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-server
          uri: lb://AUTH-SERVER
          predicates:
            - Path=/oauth2/**, /login/**, /api/auth/**

        - id: microservicio-posts
          uri: lb://MICROSERVICIO-POSTS
          predicates:
            - Path=/api/posts/**

        - id: microservicio-usuarios
          uri: lb://MICROSERVICIO-USUARIOS
          predicates:
            - Path=/api/usuarios/**
            
        - id: microservicio-comentarios
          uri: lb://MICROSERVICIO-COMENTARIOS
          predicates:
            - Path=/api/comentarios/**

        - id: microservicio-restricciones
          uri: lb://MICROSERVICIO-RESTRICCIONES
          predicates:
            - Path=/api/restricciones/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:9000}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
