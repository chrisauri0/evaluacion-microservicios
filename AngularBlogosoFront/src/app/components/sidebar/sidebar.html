<aside class="w-64 min-h-screen bg-white border-r border-gray-200 flex flex-col justify-between p-4">
  <nav class="flex flex-col gap-1">
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path"
         routerLinkActive="bg-orange-500 text-white hover:bg-orange-500"
         class="flex items-center justify-between px-4 py-2.5 rounded-lg text-sm font-medium text-gray-800 hover:bg-gray-100 transition-colors">
        <span>{{ item.label }}</span>

        @if (item.label === 'Home' && pendingCount() > 0) {
          <span class="text-xs font-semibold bg-white text-orange-600 rounded-full min-w-[20px] h-5 flex items-center justify-center px-1">
            {{ pendingCount() }}
          </span>
        }
      </a>
    }
  </nav>

  <div class="text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded-lg p-3 leading-relaxed">
    Backlog cubierto: publicaciones, moderación, roles, perfil, historial y amistades.
  </div>
</aside>
