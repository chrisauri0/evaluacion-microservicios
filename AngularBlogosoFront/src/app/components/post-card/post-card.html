<div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-lg">
      {{ post().authorAvatar }}
    </div>
    <div>
      <p class="font-semibold text-gray-900 text-sm">{{ post().authorName }}</p>
      <p class="text-xs text-gray-400">{{ post().category }}</p>
    </div>
  </div>

  <p class="text-gray-800 text-sm mt-3 mb-4">{{ post().content }}</p>

  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <button (click)="like.emit(post().id)" class="text-sm text-gray-600">
        👍 {{ post().likes }}
      </button>

      <button (click)="toggleComments()" class="text-sm text-gray-600">
        💬 {{ post().comments.length }}
      </button>
    </div>

    <button (click)="report.emit(post().id)" class="text-sm text-red-500">
      🚩 Reportar
    </button>
  </div>

  @if (showComments()) {
    <div class="mt-4 pt-4 border-t border-gray-100 flex flex-col gap-3">
      @for (comment of post().comments; track comment.id) {
        <div class="flex items-start gap-2">
          <div class="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-sm shrink-0">
            {{ comment.authorAvatar }}
          </div>
          <div class="bg-gray-50 rounded-lg px-3 py-2 flex-1">
            <p class="text-xs font-semibold text-gray-800">{{ comment.authorName }}</p>
            <p class="text-sm text-gray-700">{{ comment.content }}</p>
          </div>
        </div>
      } @empty {
        <p class="text-xs text-gray-400">Sé el primero en comentar.</p>
      }

      <div class="flex gap-2 mt-1">
        <input
          type="text"
          [ngModel]="newComment()"
          (ngModelChange)="newComment.set($event)"
          (keydown.enter)="submitComment()"
          placeholder="Escribe un comentario..."
          class="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
        />
        <button
          (click)="submitComment()"
          class="text-xs font-medium bg-orange-500 hover:bg-orange-600 text-white px-3 py-1.5 rounded-lg"
        >
          Enviar
        </button>
      </div>
    </div>
  }
</div>
