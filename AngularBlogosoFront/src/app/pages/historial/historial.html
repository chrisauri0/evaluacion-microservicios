<h1 class="text-2xl font-bold text-gray-900 mb-1">Mi historial</h1>
<p class="text-gray-500 mb-6">Todas tus publicaciones.</p>

<div class="flex flex-col gap-4">
  @for (post of myPosts(); track post.id) {
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 flex items-center justify-between">
      <div>
        <p class="text-xs text-gray-400 mb-1">{{ post.category }}</p>
        <p class="text-gray-800 text-sm mb-2">{{ post.content }}</p>
        <p class="text-xs text-gray-500">👍 {{ post.likes }} · 💬 {{ post.comments.length }}</p>
      </div>

      <button
        (click)="onDelete(post.id)"
        class="text-xs font-medium bg-red-100 text-red-700 hover:bg-red-200 px-3 py-1.5 rounded-lg shrink-0 ml-4"
      >
        Eliminar
      </button>
    </div>
  } @empty {
    <p class="text-gray-400 text-sm">Todavía no tienes publicaciones.</p>
  }
</div>
