<section class="min-h-screen grid place-items-center px-4 bg-[radial-gradient(circle_at_20%_20%,#ffe6c7_0%,transparent_38%),radial-gradient(circle_at_80%_85%,#ffdcb9_0%,transparent_36%),linear-gradient(180deg,#fff7ed,#fffdf8)]">
  <div class="w-full max-w-md bg-white/95 border border-[#f0dcc6] rounded-2xl shadow-[0_20px_60px_rgba(95,57,21,0.12)] p-8">
    <div class="inline-grid place-items-center w-12 h-12 rounded-xl bg-orange-100 border border-orange-200 text-orange-600 text-xl font-black mb-4">
      B
    </div>

    <h1 class="text-3xl font-extrabold text-[#3c2a17] tracking-tight">Bienvenido a Blogoso</h1>
    <p class="mt-2 text-[#7a624a]">Ingresa con tu cuenta para acceder a publicaciones, perfil y amistades.</p>

    <button
      (click)="iniciarSesion()"
      class="mt-6 w-full rounded-xl bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-semibold py-3 transition-colors"
    >
      Iniciar sesion
    </button>

    <p class="text-xs text-[#8f7963] mt-4 border-t border-dashed border-[#eadbc9] pt-3">
      Se abrira el formulario de autenticacion del servidor con tu flujo OAuth.
    </p>

    <div class="mt-4 text-sm text-[#6f5b45] bg-[#fff7ef] border border-[#f3dfc8] rounded-lg px-3 py-2">
      Demo: admin / admin123
    </div>
  </div>
</section>
